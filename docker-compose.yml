services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: decisionatlas-postgres
    environment:
      POSTGRES_DB: decisionatlas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql

  redis:
    image: redis:7.4-alpine
    container_name: decisionatlas-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./infra/docker/redis/redis.conf:/usr/local/etc/redis/redis.conf

volumes:
  postgres_data:
