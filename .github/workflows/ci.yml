name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync engine environment
        run: python -m uv sync --project services/engine

      - name: Run Node tests
        run: pnpm test

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run engine tests
        working-directory: services/engine
        run: python -m uv run pytest -q

      - name: Run benchmark fixture validation
        run: python scripts/ci/run_benchmark.py

      - name: Install Playwright browser
        run: pnpm --filter @decisionatlas/web exec playwright install chromium

      - name: Run browser smoke flow
        run: pnpm --filter @decisionatlas/web exec playwright test
